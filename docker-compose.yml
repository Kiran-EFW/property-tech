services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: proptech-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: proptech
      POSTGRES_PASSWORD: proptech_dev
      POSTGRES_DB: proptech
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proptech"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: proptech-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: proptech-meilisearch
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: proptech_dev_key
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
