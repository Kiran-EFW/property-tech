version: "3.8"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: proptech-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: proptech
    volumes:
      - proptech-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d proptech"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - proptech

  redis:
    image: redis:7-alpine
    container_name: proptech-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - proptech-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - proptech

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: proptech-meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: proptech-dev-master-key
    volumes:
      - proptech-meili-data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - proptech

volumes:
  proptech-pgdata:
  proptech-redis-data:
  proptech-meili-data:

networks:
  proptech:
    driver: bridge
